<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDLC Documentation</title>

  <!-- Manifest (generated) -->
  <script src="manifest.js"></script>

  <!-- Markdown / syntax / diagrams -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>

  <!-- Styles + app -->
  <link rel="stylesheet" href="viewer.css">
</head>
<body>

  <!-- ─── TOP BAR ───────────────────────────────────────────────────────── -->
  <header id="topbar">
    <button id="menu-btn" class="tb-icon-btn" aria-label="Toggle navigation">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <a id="home-link" class="tb-brand" href="#_home">
      <span class="tb-brand-mark">A</span>
      <span class="tb-brand-name" id="site-title">AIDLC Docs</span>
    </a>

    <nav id="breadcrumbs" class="tb-crumbs"></nav>

    <div class="tb-spacer"></div>

    <div id="topbar-status" class="tb-status" hidden></div>

    <button id="open-palette" class="tb-search-trigger" aria-label="Search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="tb-search-label">Search documents…</span>
      <span class="tb-kbd"><span class="tb-kbd-mod">⌘</span>K</span>
    </button>

    <button id="theme-toggle" class="tb-icon-btn" aria-label="Toggle theme">
      <svg class="theme-ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="theme-ico-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/></svg>
    </button>
  </header>

  <!-- ─── READING PROGRESS ──────────────────────────────────────────────── -->
  <div id="read-progress"><div id="read-progress-bar"></div></div>

  <!-- ─── PHASE FILTER RAIL ─────────────────────────────────────────────── -->
  <nav id="phase-rail" aria-label="Phase filter"></nav>

  <!-- ─── MAIN ──────────────────────────────────────────────────────────── -->
  <div id="main">
    <aside id="sidebar" aria-label="Document navigation">
      <div id="sidebar-scroll">
        <nav id="nav"></nav>
      </div>
      <footer id="sidebar-footer">
        <span id="file-count">0 documents</span>
        <span class="dot-sep">·</span>
        <span id="gen-time"></span>
      </footer>
    </aside>

    <div id="content-wrap">
      <main id="doc-panel"></main>
      <aside id="toc-panel" hidden></aside>
    </div>
  </div>

  <!-- ─── COMMAND PALETTE ───────────────────────────────────────────────── -->
  <div id="palette" hidden role="dialog" aria-label="Search">
    <div id="palette-backdrop"></div>
    <div id="palette-window">
      <div id="palette-input-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="palette-input" type="text" placeholder="Search documents and content…" autocomplete="off" spellcheck="false">
        <span class="tb-kbd">esc</span>
      </div>
      <div id="palette-results"></div>
      <div id="palette-footer">
        <span><span class="tb-kbd">↑</span><span class="tb-kbd">↓</span> Navigate</span>
        <span><span class="tb-kbd">↵</span> Open</span>
        <span><span class="tb-kbd">esc</span> Close</span>
      </div>
    </div>
  </div>

  <div id="live-toast"></div>

  <script src="viewer.js"></script>
</body>
</html>
