<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIDLC Docs</title>

  <!-- Docs manifest (generated by generate-manifest.py) -->
  <script src="manifest.js"></script>

  <!-- marked.js — Markdown parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <!-- highlight.js — Code syntax highlighting -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Mermaid — Diagram rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>

  <style>
    /* ── RESET & TOKENS ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 272px;
      --topbar-h:  52px;

      /* Surface colours */
      --bg:             #f4f6f8;
      --content-bg:     #ffffff;
      --sidebar-bg:     #1a2234;
      --sidebar-hover:  #26364f;
      --topbar-bg:      #232f3e;
      --border:         #dde1e7;
      --code-bg:        #f6f8fa;

      /* Text */
      --text:       #1b2733;
      --text-muted: #6a737d;
      --sidebar-text:   #b8c4d4;
      --sidebar-muted:  #607d8b;

      /* Phase accent colours */
      --ph-overview:     #546e7a;
      --ph-inception:    #0972d3;
      --ph-construction: #1b7f37;
      --ph-operations:   #c07d0a;
      --ph-other:        #6b54c0;

      /* AWS orange */
      --aws-orange: #ff9900;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
    }

    body { display: flex; flex-direction: column; background: var(--bg); }

    /* ── TOP BAR ──────────────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-h);
      background: var(--topbar-bg);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 200;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
    }

    .tb-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
      min-width: 0;
    }

    .tb-logo-icon {
      width: 30px;
      height: 30px;
      background: var(--aws-orange);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #232f3e;
      flex-shrink: 0;
    }

    #site-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      letter-spacing: .2px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tb-sep {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,.18);
      flex-shrink: 0;
    }

    /* Search */
    #search-wrap {
      flex: 0 1 280px;
      min-width: 180px;
      max-width: 320px;
      position: relative;
    }

    #search {
      width: 100%;
      padding: 7px 12px 7px 32px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: background .2s, border-color .2s;
    }
    #search::placeholder { color: rgba(255,255,255,.38); }
    #search:focus {
      background: rgba(255,255,255,.13);
      border-color: rgba(255,255,255,.28);
    }

    .search-ico {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: rgba(255,255,255,.38);
      pointer-events: none;
    }

    /* Right side */
    .tb-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #gen-time {
      font-size: 11px;
      color: rgba(255,255,255,.3);
      white-space: nowrap;
    }

    .tb-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      background: rgba(255,153,0,.15);
      border: 1px solid rgba(255,153,0,.35);
      color: var(--aws-orange);
      padding: 3px 8px;
      border-radius: 10px;
    }

    .tb-status {
      width: 240px;
      min-width: 240px;
      max-width: 240px;
      padding: 5px 10px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      line-height: 1.2;
    }
    .tb-status[hidden] { display: none; }
    .tb-status-phase {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: rgba(255,255,255,.9);
      margin-bottom: 3px;
    }
    .tb-status-stage {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tb-status-detail {
      margin-top: 2px;
      font-size: 10.5px;
      color: rgba(255,255,255,.62);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Mobile hamburger */
    #menu-btn {
      display: none;
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }

    /* ── MAIN LAYOUT ──────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ──────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s;
    }

    #nav {
      flex: 1;
      min-height: 160px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 24px;
    }

    #nav::-webkit-scrollbar { width: 4px; }
    #nav::-webkit-scrollbar-track { background: transparent; }
    #nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

    /* Phase group */
    .nav-phase { border-bottom: 1px solid rgba(255,255,255,.05); }

    .nav-phase-hd {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 11px 14px 10px;
      cursor: pointer;
      user-select: none;
      color: rgba(255,255,255,.55);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      transition: background .15s;
    }
    .nav-phase-hd:hover { background: var(--sidebar-hover); }

    .ph-ico { font-size: 13px; line-height: 1; flex-shrink: 0; }
    .ph-lbl { flex: 1; }
    .ph-arr { font-size: 9px; color: var(--sidebar-muted); transition: transform .2s; }
    .nav-phase.closed .ph-arr { transform: rotate(-90deg); }
    .nav-phase.closed .nav-phase-bd { display: none; }

    /* Section (sub-folder) */
    .nav-sec-hd {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px 6px 26px;
      cursor: pointer;
      user-select: none;
      color: var(--sidebar-muted);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      transition: background .15s;
    }
    .nav-sec-hd:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }

    .sec-arr { font-size: 8px; transition: transform .2s; }
    .nav-sec.closed .sec-arr { transform: rotate(-90deg); }
    .nav-sec.closed .nav-sec-bd { display: none; }

    /* Sub-section */
    .nav-sub-hd {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px 5px 36px;
      cursor: pointer;
      user-select: none;
      color: var(--sidebar-muted);
      font-size: 10px;
      font-weight: 500;
      transition: background .15s;
    }
    .nav-sub-hd:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
    .nav-sub.closed .sec-arr { transform: rotate(-90deg); }
    .nav-sub.closed .nav-sec-bd { display: none; }

    /* Nav item link */
    .nav-item {
      display: block;
      padding: 6px 14px;
      color: var(--sidebar-text);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.45;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s, color .12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-item:hover { background: var(--sidebar-hover); color: #fff; }
    .nav-item.active {
      background: rgba(9,114,211,.18);
      border-left-color: var(--item-color, var(--ph-inception));
      color: #fff;
      font-weight: 500;
    }

    /* Phase-root items have less indentation */
    .nav-phase-bd > .nav-item { padding-left: 26px; }

    /* Sidebar footer */
    #sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: 10px;
      color: var(--sidebar-muted);
      flex-shrink: 0;
      max-height: 38%;
      overflow-y: auto;
    }

    .aidlc-status-panel {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      color: var(--sidebar-text);
    }
    .aidlc-status-panel[hidden] { display: none; }
    .aidlc-status-hd {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: rgba(255,255,255,.5);
      margin-bottom: 10px;
    }
    .aidlc-status-current {
      padding: 10px;
      border-left: 3px solid var(--ph-inception);
      border-radius: 6px;
      background: rgba(255,255,255,.04);
      margin-bottom: 12px;
    }
    .aidlc-status-current-phase {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(255,255,255,.58);
      margin-bottom: 4px;
    }
    .aidlc-status-current-stage {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.35;
    }
    .aidlc-status-current-detail {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,.62);
    }
    .aidlc-progress-block {
      margin-bottom: 12px;
    }
    .aidlc-progress-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .aidlc-progress-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(255,255,255,.58);
    }
    .aidlc-progress-value {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .aidlc-progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .aidlc-progress-fill {
      height: 100%;
      width: var(--progress, 0%);
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(255,255,255,.2), var(--progress-color, var(--ph-inception)));
      transition: width .2s ease;
    }
    .aidlc-phase-track + .aidlc-phase-track { margin-top: 12px; }
    .aidlc-phase-track-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      padding: 7px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }
    .aidlc-phase-track-hd:hover { background: rgba(255,255,255,.05); }
    .aidlc-phase-track-meta {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,.46);
    }
    .aidlc-phase-track-arr {
      font-size: 9px;
      color: rgba(255,255,255,.46);
      transition: transform .2s;
    }
    .aidlc-phase-track-bd {
      padding: 2px 0 0;
    }
    .aidlc-phase-track.closed .aidlc-phase-track-bd { display: none; }
    .aidlc-phase-track.closed .aidlc-phase-track-arr { transform: rotate(-90deg); }
    .aidlc-stage-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .aidlc-stage-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.7);
      font-size: 10.5px;
      line-height: 1;
    }
    .aidlc-stage-pill.done {
      background: rgba(27,127,55,.18);
      border-color: rgba(27,127,55,.4);
      color: #bfe8c8;
    }
    .aidlc-stage-pill.current {
      background: rgba(9,114,211,.22);
      border-color: rgba(9,114,211,.42);
      color: #d4ebff;
    }
    .aidlc-stage-pill.pending {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.08);
      color: rgba(255,255,255,.66);
    }
    .aidlc-stage-pill.skipped {
      background: rgba(240,192,64,.14);
      border-color: rgba(240,192,64,.28);
      color: #f0d99b;
    }
    .aidlc-stage-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: .9;
      flex-shrink: 0;
    }

    /* ── CONTENT AREA ─────────────────────────────────────────────── */
    #content-wrap {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      background: var(--bg);
    }

    #content-wrap::-webkit-scrollbar { width: 7px; }
    #content-wrap::-webkit-scrollbar-track { background: var(--bg); }
    #content-wrap::-webkit-scrollbar-thumb { background: #c8cfd8; border-radius: 4px; }

    #doc-panel {
      flex: 1;
      min-width: 0;
      margin: 22px 0 22px 22px;
      background: var(--content-bg);
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
      overflow: hidden;
    }

    /* ── DOC HEADER ───────────────────────────────────────────────── */
    .doc-hdr {
      padding: 22px 30px 18px;
      border-bottom: 3px solid var(--doc-color, var(--ph-overview));
    }

    .doc-phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      color: #fff;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 10px;
    }

    .doc-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .doc-path {
      font-size: 11px;
      color: var(--text-muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    /* ── MARKDOWN BODY ────────────────────────────────────────────── */
    .doc-body {
      padding: 28px 30px 48px;
      max-width: 860px;
    }

    .doc-body h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      color: var(--text);
    }
    .doc-body h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 30px 0 10px;
      color: var(--text);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .doc-body h3 { font-size: 15px; font-weight: 600; margin: 22px 0 8px; color: var(--text); }
    .doc-body h4 { font-size: 13.5px; font-weight: 600; margin: 16px 0 6px; color: var(--text); }

    .doc-body p { line-height: 1.75; margin-bottom: 14px; }

    .doc-body a { color: var(--ph-inception); text-decoration: none; }
    .doc-body a:hover { text-decoration: underline; }

    .doc-body ul, .doc-body ol { margin: 0 0 14px 22px; }
    .doc-body li { line-height: 1.7; margin-bottom: 3px; }
    .doc-body li > ul,
    .doc-body li > ol { margin-top: 3px; margin-bottom: 3px; }

    .doc-body strong { font-weight: 600; }
    .doc-body em { font-style: italic; }

    /* Inline code */
    .doc-body :not(pre) > code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #c0392b;
    }

    /* Code block */
    .doc-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 18px;
      overflow-x: auto;
      margin-bottom: 16px;
      font-size: 12.5px;
      line-height: 1.55;
    }
    .doc-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* Blockquote */
    .doc-body blockquote {
      border-left: 4px solid var(--ph-inception);
      padding: 10px 16px;
      background: #f0f7ff;
      margin: 0 0 14px;
      border-radius: 0 4px 4px 0;
    }
    .doc-body blockquote p { margin-bottom: 0; }

    /* Table */
    .doc-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 18px;
      font-size: 13px;
    }
    .doc-body th {
      background: #f6f8fa;
      font-weight: 600;
      padding: 8px 12px;
      text-align: left;
      border: 1px solid var(--border);
    }
    .doc-body td {
      padding: 7px 12px;
      border: 1px solid var(--border);
      vertical-align: top;
    }
    .doc-body tr:nth-child(even) td { background: #fafbfc; }

    /* HR */
    .doc-body hr { border: none; border-top: 1px solid var(--border); margin: 26px 0; }

    /* Mermaid diagram container */
    .doc-body .mermaid-wrap {
      text-align: center;
      padding: 16px 12px 12px;
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 18px;
      overflow-x: auto;
    }
    .doc-body .mermaid-wrap svg {
      max-width: 100%;
      height: auto;
      display: inline-block;
    }
    /* Mermaid error states */
    .doc-body .mermaid-err {
      font-size: 12px;
      color: #c0392b;
      margin-bottom: 6px;
    }
    .doc-body .mermaid-src {
      text-align: left;
      background: #fff5f5;
      border: 1px dashed #e0a0a0;
      border-radius: 4px;
    }

    /* Task-list checkboxes */
    .doc-body li.task-list-item { list-style: none; margin-left: -18px; }
    .doc-body input[type="checkbox"] {
      margin-right: 7px;
      accent-color: var(--ph-inception);
    }

    /* ── ANSWER FIELDS ────────────────────────────────────────────── */
    .answer-field {
      margin: 10px 0 14px;
      padding: 12px 14px 10px;
      background: #f0f7ff;
      border: 1.5px solid var(--ph-inception);
      border-radius: 6px;
    }
    .answer-lbl {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--ph-inception);
      margin-bottom: 7px;
    }
    .answer-ta {
      display: block;
      width: 100%;
      min-height: 52px;
      padding: 8px 10px;
      border: 1px solid #b3d0ef;
      border-radius: 4px;
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .answer-ta:focus {
      border-color: var(--ph-inception);
      box-shadow: 0 0 0 3px rgba(9,114,211,.12);
    }
    .answer-ta.has-value { background: #fafeff; }

    /* Save button — lives inside doc header */
    .save-answers-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 7px 18px;
      background: var(--ph-inception);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .save-answers-btn:hover:not(:disabled) { background: #0756b0; }
    .save-answers-btn:disabled { opacity: .6; cursor: default; }
    .save-answers-btn.ok { background: var(--ph-construction); }

    /* Save-server notice banner */
    .save-notice {
      position: relative;
      margin-bottom: 18px;
      padding: 12px 40px 12px 14px;
      background: #fff8e1;
      border: 1px solid #f0c040;
      border-left: 4px solid #f0c040;
      border-radius: 6px;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
    }
    .save-notice code {
      background: rgba(0,0,0,.07);
      border: none;
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--text);
    }
    .save-notice-dl {
      margin-top: 8px;
      padding: 5px 12px;
      background: var(--ph-inception);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;

    }
    .save-notice-dl:hover { background: #0756b0; }
    .save-notice-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
    }
    .save-notice-close:hover { color: var(--text); }

    /* ── LIVE RELOAD TOAST ────────────────────────────────────────── */
    #live-toast {
      position: fixed;
      bottom: 22px;
      right: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #1a2234;
      color: #fff;
      border-left: 3px solid var(--ph-construction);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
    }
    #live-toast.show { opacity: 1; transform: translateY(0); }

    /* ── TABLE OF CONTENTS (right panel) ─────────────────────────── */
    #toc-panel {
      width: 200px;
      flex-shrink: 0;
      padding: 22px 14px 22px 0;
      margin-right: 22px;
    }

    .toc-hd {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .toc-link {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 3px 0;
      line-height: 1.35;
      transition: color .12s;
      cursor: pointer;
    }
    .toc-link:hover { color: var(--text); }
    .toc-link.toc-h3 { padding-left: 10px; font-size: 11.5px; }

    /* ── WELCOME / ERROR STATE ────────────────────────────────────── */
    #welcome-state {
      padding: 56px 32px;
      text-align: center;
      color: var(--text-muted);
    }
    #welcome-state .ws-icon { font-size: 48px; margin-bottom: 18px; }
    #welcome-state h2 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    #welcome-state p { max-width: 480px; margin: 0 auto 6px; line-height: 1.6; }
    #welcome-state code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--text);
    }

    /* ── SEARCH HIGHLIGHT ─────────────────────────────────────────── */
    .nav-item mark {
      background: rgba(255,153,0,.35);
      color: #fff;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── RESPONSIVE ───────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #toc-panel { display: none; }
    }

    @media (max-width: 640px) {
      :root { --sidebar-w: 260px; }
      #menu-btn { display: block; }
      .tb-status { display: none; }
      #search-wrap {
        flex: 1 1 auto;
        min-width: 0;
        max-width: none;
      }
      #sidebar {
        position: fixed;
        left: calc(-1 * var(--sidebar-w));
        top: var(--topbar-h);
        height: calc(100dvh - var(--topbar-h));
        z-index: 150;
        box-shadow: 2px 0 12px rgba(0,0,0,.4);
        transition: left .25s;
      }
      #sidebar.open { left: 0; }
      #gen-time { display: none; }
      #doc-panel { margin: 12px; border-radius: 6px; }
    }
  </style>
</head>
<body>

<!-- ── TOP BAR ─────────────────────────────────────────────────────────── -->
<header id="topbar">
  <button id="menu-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>

  <div class="tb-logo">
    <div class="tb-logo-icon">A</div>

  </div>

  <div class="tb-sep"></div>

  <div id="search-wrap">
    <span class="search-ico">🔍</span>

           autocomplete="off" spellcheck="false">
  </div>

  <div class="tb-right">
    <span class="tb-badge">AIDLC</span>
    <div id="aidlc-status-summary" class="tb-status" hidden></div>
    <span id="gen-time"></span>
  </div>
</header>

<!-- Live-reload toast -->
<div id="live-toast"></div>

<!-- ── MAIN ────────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div id="nav"></div>
    <div id="sidebar-footer">
      <span id="file-count"></span>
      <div id="aidlc-status-panel" class="aidlc-status-panel" hidden></div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div id="content-wrap">
    <div id="doc-panel">
      <div id="welcome-state">
        <div class="ws-icon">📄</div>
        <h2>Loading…</h2>
        <p>Please wait while docs are loading.</p>
      </div>
    </div>
    <div id="toc-panel" style="display:none"></div>
  </div>

</div><!-- #main -->

<!-- ── SCRIPT ──────────────────────────────────────────────────────────── -->
<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════════
// AIDLC DOCS VIEWER  ·  Single-page documentation renderer
// ════════════════════════════════════════════════════════════════════════════

// ─── PHASE METADATA ─────────────────────────────────────────────────────────
const PHASE = {
  overview:     { icon: "📋", label: "Overview",            color: "#546e7a", order: 0 },
  inception:    { icon: "🔵", label: "Inception Phase",     color: "#0972d3", order: 1 },
  construction: { icon: "🟢", label: "Construction Phase",  color: "#1b7f37", order: 2 },
  operations:   { icon: "🟡", label: "Operations Phase",    color: "#c07d0a", order: 3 },
  other:        { icon: "📁", label: "Other",               color: "#6b54c0", order: 4 },
};

// Preferred ordering of sections within each phase
const SECTION_ORDER = {
  inception:    ["plans", "reverse-engineering", "requirements", "user-stories",
                 "application-design", "units-generation", "workflow-planning"],
  construction: ["functional-design", "nfr-requirements", "nfr-design",
                 "infrastructure-design", "code", "build-and-test"],
  operations:   [],
};

// Human-readable labels for known section slugs
const SECTION_LABELS = {
  "reverse-engineering":  "Reverse Engineering",
  "nfr-requirements":     "NFR Requirements",
  "nfr-design":           "NFR Design",
  "functional-design":    "Functional Design",
  "infrastructure-design":"Infrastructure Design",
  "user-stories":         "User Stories",
  "application-design":   "Application Design",
  "build-and-test":       "Build & Test",
  "code-generation":      "Code Generation",
  "workflow-planning":    "Workflow Planning",
  "workspace-detection":  "Workspace Detection",
  "requirements-analysis":"Requirements Analysis",
  "units-generation":     "Units Generation",
};

const AIDLC_STAGE_ORDER = {
  inception: [
    "Workspace Detection",
    "Reverse Engineering",
    "Requirements Analysis",
    "User Stories",
    "Workflow Planning",
    "Application Design",
    "Units Planning",
    "Units Generation",
  ],
  construction: [
    "Functional Design",
    "NFR Requirements",
    "NFR Design",
    "Infrastructure Design",
    "Code Generation",
    "Build and Test",
  ],
  operations: ["Operations"],
};

function toLabel(slug) {
  return SECTION_LABELS[slug] || slug.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function normalizePhaseKey(raw) {
  const value = String(raw || "").toLowerCase();
  if (value.includes("inception")) return "inception";
  if (value.includes("construction")) return "construction";
  if (value.includes("operation")) return "operations";
  return null;
}

function escapeRegExp(str) {
  return String(str).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function parseAidlcStatus(files) {
  const stateFile = files.find((file) => file.path === "aidlc-state.md");
  if (!stateFile?.content) return null;

  const content = stateFile.content;
  const currentStageRaw = content.match(/-\s+\*\*Current Stage\*\*:\s*(.+)/i)?.[1]?.trim() || "";
  const phases = parseAidlcStageProgress(content);

  for (const [phaseKey, defaults] of Object.entries(AIDLC_STAGE_ORDER)) {
    if (!phases[phaseKey]) {
      phases[phaseKey] = defaults.map((label) => ({ label, status: "pending" }));
      continue;
    }

    const seen = new Set(phases[phaseKey].map((item) => item.label.toLowerCase()));
    for (const label of defaults) {
      if (!seen.has(label.toLowerCase())) phases[phaseKey].push({ label, status: "pending" });
    }
  }

  return {
    currentStageRaw,
    current: parseCurrentAidlcStage(currentStageRaw, phases),
    phases,
  };
}

function parseAidlcStageProgress(content) {
  const phases = {};
  const lines = String(content || "").split("\n");
  let currentPhase = null;

  for (const line of lines) {
    const phaseMatch = /^###\s+.*?(INCEPTION|CONSTRUCTION|OPERATIONS)\s+PHASE\s*$/i.exec(line.trim());
    if (phaseMatch) {
      currentPhase = normalizePhaseKey(phaseMatch[1]);
      phases[currentPhase] = phases[currentPhase] || [];
      continue;
    }

    if (/^##\s+/.test(line.trim())) {
      currentPhase = null;
      continue;
    }

    if (!currentPhase) continue;

    const itemMatch = /^-\s+\[(x| )\]\s+(.+)$/i.exec(line);
    if (!itemMatch) continue;

    const checked = itemMatch[1].toLowerCase() === "x";
    const rawLabel = itemMatch[2].trim();
    const skipped = /\bSKIP\b/i.test(rawLabel);
    const label = rawLabel.replace(/\s*-\s*SKIP\s*$/i, "").trim();

    phases[currentPhase].push({
      label,
      status: checked ? "completed" : (skipped ? "skipped" : "pending"),
    });
  }

  return phases;
}

function parseCurrentAidlcStage(raw, phases) {
  if (!raw) return null;

  const parts = raw.split(/\s+-\s+/);
  const phaseKey = normalizePhaseKey(parts[0]);
  const remainder = parts.slice(1).join(" - ").trim();
  const phaseStages = phaseKey ? (phases[phaseKey] || []) : [];

  let matchedStage = "";
  let detail = remainder;
  for (const item of phaseStages) {
    const rx = new RegExp(`\\b${escapeRegExp(item.label)}\\b`, "i");
    const match = rx.exec(remainder);
    if (!match) continue;
    if (item.label.length <= matchedStage.length) continue;
    matchedStage = item.label;
    detail = remainder
      .slice(0, match.index)
      .concat(remainder.slice(match.index + match[0].length))
      .replace(/^\s*[-:]+\s*|\s*[-:]+\s*$/g, "")
      .trim();
  }

  return {
    phaseKey,
    phaseLabel: phaseKey ? (PHASE[phaseKey]?.label || toLabel(phaseKey)) : parts[0],
    phaseIcon: phaseKey ? (PHASE[phaseKey]?.icon || "📁") : "📁",
    stageLabel: matchedStage || remainder || raw,
    detail: detail && detail !== matchedStage ? detail : "",
  };
}

function getPhaseCompletion(stages) {
  const total = stages.length;
  const completed = stages.filter((item) => item.status === "completed").length;
  return { completed, total };
}

function getPhasePercent(stages) {
  const counts = getPhaseCompletion(stages);
  const percent = counts.total > 0 ? Math.round((counts.completed / counts.total) * 100) : 0;
  return { ...counts, percent };
}

function renderProgressBar(label, percent, color) {
  return (
    `<div class="aidlc-progress-block">` +
      `<div class="aidlc-progress-row">` +
        `<span class="aidlc-progress-label">${esc(label)}</span>` +
        `<span class="aidlc-progress-value">${percent}%</span>` +
      `</div>` +
      `<div class="aidlc-progress-track">` +
        `<div class="aidlc-progress-fill" style="--progress:${percent}%;--progress-color:${color}"></div>` +
      `</div>` +
    `</div>`
  );
}

function renderAidlcStatus(status) {
  const summaryEl = document.getElementById("aidlc-status-summary");
  const panelEl = document.getElementById("aidlc-status-panel");
  if (!summaryEl || !panelEl) return;

  if (!status?.current) {
    summaryEl.hidden = true;
    panelEl.hidden = true;
    return;
  }

  const { current, phases } = status;
  const accent = current.phaseKey ? (PHASE[current.phaseKey]?.color || "#546e7a") : "#546e7a";
  const allStages = Object.values(phases).flat();
  const overall = getPhasePercent(allStages);

  summaryEl.hidden = false;
  summaryEl.style.borderColor = `${accent}66`;
  summaryEl.innerHTML =
    `<div class="tb-status-phase">${current.phaseIcon} ${esc(current.phaseLabel)}</div>` +
    `<div class="tb-status-stage">${esc(current.stageLabel)}</div>` +
    (current.detail ? `<div class="tb-status-detail">${esc(current.detail)}</div>` : "") +
    `<div class="tb-status-detail">Progress ${overall.percent}%</div>`;

  const orderedPhases = ["inception", "construction", "operations"].filter((key) => phases[key]?.length);
  panelEl.hidden = false;
  panelEl.innerHTML =
    `<div class="aidlc-status-hd">AIDLC Status</div>` +
    `<div class="aidlc-status-current" style="border-left-color:${accent}">` +
      `<div class="aidlc-status-current-phase">Current Phase</div>` +
      `<div class="aidlc-status-current-stage">${esc(current.phaseLabel)} · ${esc(current.stageLabel)}</div>` +
      (current.detail ? `<div class="aidlc-status-current-detail">${esc(current.detail)}</div>` : "") +
    `</div>` +
    renderProgressBar("Overall Progress", overall.percent, accent) +
    orderedPhases.map((phaseKey) => renderAidlcPhaseTrack(phaseKey, phases[phaseKey], current)).join("");
}

function renderAidlcPhaseTrack(phaseKey, stages, current) {
  const meta = PHASE[phaseKey] || { icon: "📁", label: toLabel(phaseKey), color: "#546e7a" };
  const counts = getPhasePercent(stages);
  const isCurrentPhase = current.phaseKey === phaseKey;
  const pills = stages.map((stage) => {
    const isCurrent = current.phaseKey === phaseKey && current.stageLabel.toLowerCase() === stage.label.toLowerCase();
    const stateClass = isCurrent ? "current" : (
      stage.status === "completed" ? "done" : (stage.status === "skipped" ? "skipped" : "pending")
    );
    return `<span class="aidlc-stage-pill ${stateClass}"><span class="aidlc-stage-dot"></span>${esc(stage.label)}</span>`;
  }).join("");

  return (
    `<div class="aidlc-phase-track ${isCurrentPhase ? "" : "closed"}">` +
      `<div class="aidlc-phase-track-hd" onclick="this.parentElement.classList.toggle('closed')">` +
        `<span>${meta.icon}</span><span>${esc(meta.label)}</span>` +
        `<span class="aidlc-phase-track-meta">${counts.completed}/${counts.total} · ${counts.percent}%</span>` +
        `<span class="aidlc-phase-track-arr">▾</span>` +
      `</div>` +
      `<div class="aidlc-phase-track-bd">` +
        renderProgressBar(`${meta.label} Progress`, counts.percent, meta.color) +
        `<div class="aidlc-stage-list">${pills}</div>` +
      `</div>` +
    `</div>`
  );
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  // Initialise Mermaid once
  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: "default", securityLevel: "loose" });
  }

  // Configure marked.js (no renderer override — mermaid is handled via DOM post-processing)
  marked.use({ gfm: true, breaks: false });

  if (typeof window.AIDLC_MANIFEST === "undefined") {
    showState("⚠️", "manifest.js not found",
      "Run the generator script first:<br>" +
      "<code>python aidlc-docs/_docs-viewer/generate-manifest.py</code><br><br>" +
      "Then refresh this page.");
    return;
  }

  const M = window.AIDLC_MANIFEST;
  const files = M.files || [];
  const aidlcStatus = parseAidlcStatus(files);

  // Populate header
  document.title = (M.title || "AIDLC Docs");
  document.getElementById("site-title").textContent = M.title || "AIDLC Docs";
  document.getElementById("file-count").textContent = files.length + " documents";
  renderAidlcStatus(aidlcStatus);

  if (M.generated) {
    const d = new Date(M.generated);
    document.getElementById("gen-time").textContent =
      "Updated " + d.toLocaleDateString() + " " + d.toLocaleTimeString();
  }

  if (files.length === 0) {
    showState("📭", "No documents found",
      "The docs folder appears to be empty or no .md files were found.<br>" +
      "Check your <code>DOCS_ROOT</code> config in generate-manifest.py.");
    return;
  }

  // Build navigation
  renderNav(files);

  // Hash-based routing
  const navigate = () => {
    const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
    const file  = hash ? files.find(f => f.path === hash) : null;
    navigateTo(file || files[0]);
  };
  window.addEventListener("hashchange", navigate);
  navigate();

  // Search
  const searchEl = document.getElementById("search");
  searchEl.addEventListener("input",  e => filterNav(e.target.value.toLowerCase().trim()));
  searchEl.addEventListener("keydown", e => {
    if (e.key === "Escape") { e.target.value = ""; filterNav(""); }
  });

  // Keyboard shortcut: / focuses search
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== searchEl) {
      e.preventDefault();
      searchEl.focus();
      searchEl.select();
    }
  });

  // Live reload via SSE (only active when server runs with --watch)
  connectLiveReload();
});

// ─── WELCOME / ERROR STATE ───────────────────────────────────────────────────
function showState(icon, title, body) {
  document.getElementById("doc-panel").innerHTML =
    `<div id="welcome-state">
       <div class="ws-icon">${icon}</div>
       <h2>${title}</h2>
       <p>${body}</p>
     </div>`;
  document.getElementById("toc-panel").style.display = "none";
}

// ─── NAV BUILDING ────────────────────────────────────────────────────────────
function renderNav(files) {
  // Group files: phase → section → subsection → [files]
  const groups = {};
  for (const f of files) {
    const parts = f.path.split("/");
    const phase      = parts.length === 1 ? "overview" : parts[0];
    const section    = parts.length >= 3  ? parts[1]   : "__root__";
    const subsection = parts.length >= 4  ? parts[2]   : "__root__";

    (groups[phase]                              = groups[phase]               || {});
    (groups[phase][section]                     = groups[phase][section]      || {});
    (groups[phase][section][subsection]         = groups[phase][section][subsection] || []).push(f);
  }

  const nav = document.getElementById("nav");
  nav.innerHTML = "";

  const phaseOrder = ["overview", "inception", "construction", "operations", "other"];
  const phases     = [...new Set([...phaseOrder, ...Object.keys(groups)])].filter(p => groups[p]);

  for (const phase of phases) {
    const meta = PHASE[phase] || { icon: "📁", label: toLabel(phase), color: "#546e7a" };
    nav.appendChild(buildPhaseEl(phase, meta, groups[phase]));
  }
}

function buildPhaseEl(phase, meta, sections) {
  const wrap = document.createElement("div");
  wrap.className = "nav-phase";
  wrap.dataset.phase = phase;

  const hd = document.createElement("div");
  hd.className = "nav-phase-hd";
  hd.innerHTML =
    `<span class="ph-ico">${meta.icon}</span>` +
    `<span class="ph-lbl">${meta.label}</span>` +
    `<span class="ph-arr">▾</span>`;
  hd.onclick = () => wrap.classList.toggle("closed");
  wrap.appendChild(hd);

  const bd = document.createElement("div");
  bd.className = "nav-phase-bd";
  wrap.appendChild(bd);

  // Root-level files (no section grouping)
  const root = sections["__root__"];
  if (root && root["__root__"]) {
    for (const f of root["__root__"]) {
      bd.appendChild(makeItem(f, meta.color, 26));
    }
  }

  // Sections
  const secOrder  = SECTION_ORDER[phase] || [];
  const secKeys   = [...new Set([...secOrder, ...Object.keys(sections).filter(s => s !== "__root__")])];

  for (const sec of secKeys) {
    if (!sections[sec]) continue;
    bd.appendChild(buildSectionEl(sec, sections[sec], meta.color));
  }

  return wrap;
}

function buildSectionEl(sec, subsections, color) {
  const wrap = document.createElement("div");
  wrap.className = "nav-sec";
  wrap.dataset.section = sec;

  const hd = document.createElement("div");
  hd.className = "nav-sec-hd";
  hd.innerHTML = `<span class="sec-arr">▾</span><span>${toLabel(sec)}</span>`;
  hd.onclick = () => wrap.classList.toggle("closed");
  wrap.appendChild(hd);

  const bd = document.createElement("div");
  bd.className = "nav-sec-bd";
  wrap.appendChild(bd);

  // Files directly under this section
  if (subsections["__root__"]) {
    for (const f of subsections["__root__"]) {
      bd.appendChild(makeItem(f, color, 40));
    }
  }

  // Sub-sections (3-level depth)
  for (const [sub, files] of Object.entries(subsections)) {
    if (sub === "__root__") continue;
    const subWrap = document.createElement("div");
    subWrap.className = "nav-sub nav-sec";
    subWrap.dataset.subsection = sub;

    const subHd = document.createElement("div");
    subHd.className = "nav-sub-hd nav-sec-hd";
    subHd.style.paddingLeft = "36px";
    subHd.innerHTML = `<span class="sec-arr">▾</span><span>${toLabel(sub)}</span>`;
    subHd.onclick = () => subWrap.classList.toggle("closed");
    subWrap.appendChild(subHd);

    const subBd = document.createElement("div");
    subBd.className = "nav-sec-bd";
    for (const f of files) {
      subBd.appendChild(makeItem(f, color, 52));
    }
    subWrap.appendChild(subBd);
    bd.appendChild(subWrap);
  }

  return wrap;
}

function makeItem(file, color, indent) {
  const a = document.createElement("a");
  a.className = "nav-item";
  a.href = "#" + encodeURIComponent(file.path);
  a.dataset.path = file.path;
  a.textContent = file.title;
  a.style.paddingLeft = indent + "px";
  a.style.setProperty("--item-color", color);
  return a;
}

// ─── SEARCH FILTER ───────────────────────────────────────────────────────────
function filterNav(query) {
  document.querySelectorAll(".nav-item").forEach(item => {
    const text = item.dataset.path + " " + item.textContent;
    item.style.display = !query || text.toLowerCase().includes(query) ? "" : "none";
  });

  // Show/hide empty sections and auto-expand matching ones
  document.querySelectorAll(".nav-sec, .nav-sub").forEach(sec => {
    const visible = [...sec.querySelectorAll(".nav-item")].some(i => i.style.display !== "none");
    sec.style.display = visible ? "" : "none";
    if (visible && query) sec.classList.remove("closed");
  });

  if (query) {
    document.querySelectorAll(".nav-phase").forEach(ph => {
      const visible = [...ph.querySelectorAll(".nav-item")].some(i => i.style.display !== "none");
      if (visible) ph.classList.remove("closed");
    });
  }
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function navigateTo(file) {
  if (!file) return;

  // Update hash without triggering hashchange loop
  const newHash = "#" + encodeURIComponent(file.path);
  if (location.hash !== newHash) history.replaceState(null, "", newHash);

  // Mark active
  document.querySelectorAll(".nav-item").forEach(el => {
    el.classList.toggle("active", el.dataset.path === file.path);
  });

  // Expand parent sections
  const activeEl = document.querySelector(`.nav-item[data-path="${CSS.escape(file.path)}"]`);
  if (activeEl) {
    let p = activeEl.parentElement;
    while (p && p.id !== "nav") {
      if (p.classList.contains("nav-phase") ||
          p.classList.contains("nav-sec")   ||
          p.classList.contains("nav-sub"))   { p.classList.remove("closed"); }
      p = p.parentElement;
    }
    // Scroll nav item into view without moving main content
    activeEl.scrollIntoView({ block: "nearest" });
  }

  // Close mobile sidebar
  if (window.innerWidth <= 640) {
    document.getElementById("sidebar").classList.remove("open");
  }

  renderDoc(file);
}

// ─── DOCUMENT RENDERER ───────────────────────────────────────────────────────
function normalizeInlineOptionLines(markdown) {
  const lines = (markdown || "").split("\n");
  let inFence = false;

  return lines.map((line, idx) => {
    if (/^\s*```/.test(line)) {
      inFence = !inFence;
      return line;
    }
    if (inFence) return line;

    const trimmed = line.trimStart();
    if (!/^[A-Z]\)\s+/.test(trimmed)) return line;

    const indent = line.slice(0, line.length - trimmed.length);
    const parts = /\s+[A-Z]\)\s+/.test(trimmed)
      ? trimmed.split(/\s+(?=[A-Z]\)\s+)/)
      : [trimmed];
    if (parts.length > 1) {
      return parts.map((part) => indent + part + "  ").join("\n");
    }

    const next = lines[idx + 1]?.trimStart() || "";
    if (/^[A-Z]\)\s+/.test(next)) {
      return line + "  ";
    }

    return line;
  }).join("\n");
}

async function renderDoc(file) {
  const phase = file.phase || "overview";
  const meta  = PHASE[phase] || PHASE.overview;
  const normalizedContent = normalizeInlineOptionLines(file.content || "");
  const answerFields = extractAnswerFields(file.content || "");
  const renderContent = answerFields.length > 0
    ? injectAnswerPlaceholders(normalizedContent)
    : normalizedContent;
  const html = marked.parse(renderContent);

  const panel = document.getElementById("doc-panel");
  panel.innerHTML =
    `<div class="doc-hdr" style="border-bottom-color:${meta.color}">
       <span class="doc-phase-badge" style="background:${meta.color}">
         ${meta.icon}&nbsp;${meta.label}
       </span>
       <div class="doc-title">${esc(file.title)}</div>
       <div class="doc-path">${esc(file.path)}</div>
     </div>
     <div class="doc-body">${html}</div>`;

  // ── Mermaid: find <pre><code class="language-mermaid"> blocks and render them ──
  // Using mermaid.render() per diagram is more reliable than mermaid.run() on injected DOM.
  // codeEl.textContent gives us the HTML-decoded raw source (e.g. "-->" not "--&gt;").
  if (window.mermaid) {
    let idx = 0;
    for (const codeEl of [...panel.querySelectorAll("pre code.language-mermaid")]) {
      const pre    = codeEl.closest("pre");
      const source = codeEl.textContent; // decoded: "&gt;" -> ">"
      const wrap   = document.createElement("div");
      wrap.className = "mermaid-wrap";
      try {
        const id = "md-" + Date.now() + "-" + (idx++);
        const { svg } = await mermaid.render(id, source);
        wrap.innerHTML = svg;
      } catch (e) {
        wrap.innerHTML =
          `<div class="mermaid-err">Diagram parse error - raw source:</div>` +
          `<pre class="mermaid-src"><code>${esc(source)}</code></pre>`;
        console.warn("Mermaid render error:", e);
      }
      pre.replaceWith(wrap);
    }
  }

  // ── Syntax-highlight remaining code blocks (skip mermaid -- already replaced) ──
  panel.querySelectorAll("pre code:not(.language-mermaid)").forEach(block => {
    if (!block.classList.contains("hljs")) hljs.highlightElement(block);
  });

  // ── Answer fields: replace [Answer]: markers with editable textareas ──
  const docBody = panel.querySelector(".doc-body");
  if (docBody && answerFields.length > 0) {
    const count = processAnswerMarkers(docBody, file, answerFields);
    if (count > 0) {
      const hdr = panel.querySelector(".doc-hdr");
      if (hdr) {
        const btn = document.createElement("button");
        btn.className = "save-answers-btn";
        // If any [Answer]: already has content in the file → "Atualizar"
        const hasAnswers = /\[Answer\]:\s*\S/.test(file.content);
        const btnLabel   = hasAnswers ? "&#128260; Atualizar" : "&#128190; Salvar respostas";
        btn.innerHTML    = btnLabel;
        btn.dataset.label = btnLabel; // kept for fallback restore
        btn.onclick = () => saveAnswers(file, docBody, btn);
        hdr.appendChild(btn);
      }
    }
  }

  // Scroll to top
  document.getElementById("content-wrap").scrollTo({ top: 0 });

  // Build TOC
  buildTOC(panel);
}

// ─── ANSWER FIELDS ───────────────────────────────────────────────────────────

const STANDALONE_ANSWER_RE = /(^|\n)([ \t]*)\[Answer\]:(.*?)(?=\n|$)/g;

function extractAnswerFields(markdown) {
  const fields = [];
  markdown.replace(STANDALONE_ANSWER_RE, (_match, _lineStart, _indent, answer) => {
    fields.push({ value: answer.trim() });
    return _match;
  });
  return fields;
}

function injectAnswerPlaceholders(markdown) {
  let idx = 0;
  return markdown.replace(STANDALONE_ANSWER_RE, (_match, lineStart) => {
    const placeholder = `<div class="answer-field-slot" data-answer-idx="${idx}"></div>`;
    idx += 1;
    return `${lineStart}${placeholder}`;
  });
}

/**
 * Replaces raw answer placeholders in the rendered doc with styled textareas
 * and restores either persisted drafts or values extracted from the original
 * markdown content. Returns the number of answer fields found.
 */
function processAnswerMarkers(docBody, file, answerFields) {
  const slots = [...docBody.querySelectorAll(".answer-field-slot")];
  if (slots.length === 0) return 0;

  // Load saved drafts (keyed by file path)
  let drafts = [];
  try { drafts = JSON.parse(localStorage.getItem("aidlc-ans-" + file.path) || "[]"); }
  catch (_) {}

  slots.forEach((slot, idx) => {
    const existing = answerFields[idx]?.value || "";
    const value = drafts[idx] !== undefined ? drafts[idx] : existing;
    const field = document.createElement("div");
    field.className = "answer-field";

    const lbl = document.createElement("div");
    lbl.className = "answer-lbl";
    lbl.innerHTML = "<span>&#9999;&#65039;</span><span>Answer</span>";
    field.appendChild(lbl);

    const ta = document.createElement("textarea");
    ta.className   = "answer-ta" + (value ? " has-value" : "");
    ta.dataset.idx = idx;
    ta.value       = value;
    ta.placeholder = "Type your answer here…";
    ta.rows        = Math.max(2, (value || "").split("\n").length + 1);

    ta.addEventListener("input", () => {
      ta.rows = Math.max(2, ta.value.split("\n").length + 1);
      ta.classList.toggle("has-value", ta.value.trim().length > 0);
      persistDrafts(file.path, docBody);
    });

    field.appendChild(ta);
    slot.replaceWith(field);
  });

  return slots.length;
}

/** Save all current textarea values to localStorage as a draft. */
function persistDrafts(filePath, docBody) {
  const vals = [...docBody.querySelectorAll(".answer-ta")].map(t => t.value);
  try { localStorage.setItem("aidlc-ans-" + filePath, JSON.stringify(vals)); }
  catch (_) {}
}

/**
 * Rebuild the original markdown with [Answer]: lines updated to the current
 * textarea values (matched positionally so duplicate empty answers are safe).
 *
 * Uses the same standalone-marker logic as processAnswerMarkers: only matches
 * [Answer]: that appears at the start of a line (possibly with leading
 * whitespace), so occurrences inside instruction text (e.g. inside backticks
 * or mid-sentence) are correctly skipped.
 */
function rebuildMarkdown(originalContent, answers) {
  // Matches [Answer]: only at the start of a line (with optional indentation).
  // Group 1 = leading newline or "" (start-of-string), group 2 = indentation.
  const STANDALONE = /(^|\n)([ \t]*)\[Answer\]:/;

  let out  = originalContent;
  let from = 0;
  for (const answer of answers) {
    const slice = out.slice(from);
    const match = STANDALONE.exec(slice);
    if (!match) break;

    // Absolute position of the '[' character in `out`
    const pos = from + match.index + match[1].length + match[2].length;

    const lineEnd = out.indexOf("\n", pos);
    const end     = lineEnd === -1 ? out.length : lineEnd;
    const newLine = "[Answer]: " + answer;
    out  = out.slice(0, pos) + newLine + out.slice(end);
    from = pos + newLine.length;
  }
  return out;
}

/**
 * Save answers directly to disk via the local save-server.py (/save endpoint).
 * Falls back to a browser download if the server is not running,
 * and shows an inline banner explaining how to start it.
 */
async function saveAnswers(file, docBody, btn) {
  const answers = [...docBody.querySelectorAll(".answer-ta")].map(t => t.value);
  const updated = rebuildMarkdown(file.content, answers);

  btn.disabled = true;
  btn.innerHTML = "&#8987; Saving…";

  // ── 1. Try the local save server (no OS dialog) ──────────────────────
  try {
    const res = await fetch("/save", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ path: file.path, content: updated }),
    });
    if (res.ok) {
      try { localStorage.removeItem("aidlc-ans-" + file.path); } catch (_) {}
      flashBtn(btn, "&#10003; Saved!", "ok");
      removeSaveNotice(docBody);
      return;
    }
  } catch (_) {
    // Server not running — show helper notice and offer download fallback
  }

  // ── 2. Server unavailable: show one-time banner + download fallback ──
  btn.disabled = false;
  btn.innerHTML = btn.dataset.label || btn.innerHTML; // restore original label
  showSaveNotice(docBody, file, updated);
}

/** Show a banner explaining how to start the server, with a download fallback. */
function showSaveNotice(docBody, file, updatedContent) {
  if (docBody.querySelector(".save-notice")) return; // already shown

  const fname  = file.path.split("/").pop();
  const notice = document.createElement("div");
  notice.className = "save-notice";
  notice.innerHTML =
    `<strong>&#128161; Para salvar sem dialog, rode o servidor local:</strong><br>
     <code>python aidlc-docs/_docs-viewer/save-server.py</code><br>
     depois abra <code>http://localhost:8765</code> no lugar do arquivo direto.<br>
     <button class="save-notice-dl">&#8659; Baixar arquivo</button>
     <button class="save-notice-close">&#10005;</button>`;

  notice.querySelector(".save-notice-dl").onclick = () => {
    const blob = new Blob([updatedContent], { type: "text/markdown;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    Object.assign(document.createElement("a"), { href: url, download: fname }).click();
    URL.revokeObjectURL(url);
    try { localStorage.removeItem("aidlc-ans-" + file.path); } catch (_) {}
    notice.remove();
  };

  notice.querySelector(".save-notice-close").onclick = () => notice.remove();

  docBody.prepend(notice);
}

function removeSaveNotice(docBody) {
  docBody.querySelector(".save-notice")?.remove();
}

function flashBtn(btn, label, cls) {
  const orig = btn.innerHTML;
  btn.innerHTML = label;
  if (cls) btn.classList.add(cls);
  btn.disabled = true;
  setTimeout(() => {
    btn.innerHTML = orig;
    if (cls) btn.classList.remove(cls);
    btn.disabled = false;
  }, 2500);
}

// ─── TABLE OF CONTENTS ───────────────────────────────────────────────────────
function buildTOC(panel) {
  const tocPanel = document.getElementById("toc-panel");
  const headings = panel.querySelectorAll("h2, h3");

  if (headings.length < 3) {
    tocPanel.style.display = "none";
    return;
  }

  tocPanel.style.display = "";
  tocPanel.innerHTML = `<div class="toc-hd">On this page</div>`;

  headings.forEach((h, i) => {
    h.id = "h-" + i;
    const a = document.createElement("a");
    a.className = "toc-link" + (h.tagName === "H3" ? " toc-h3" : "");
    a.textContent = h.textContent;
    a.onclick = () => h.scrollIntoView({ behavior: "smooth", block: "start" });
    tocPanel.appendChild(a);
  });
}

// ─── LIVE RELOAD (SSE) ───────────────────────────────────────────────────────

/**
 * Connect to the /events SSE stream exposed by save-server.py --watch.
 * On a "reload" event: re-fetch manifest.js, update the nav, show a toast.
 * If the server is not running or not in watch mode, fails silently.
 */
function connectLiveReload() {
  if (!window.EventSource) return;

  const es = new EventSource("/events");

  es.addEventListener("reload", async (e) => {
    let info = {};
    try { info = JSON.parse(e.data); } catch (_) {}

    // Re-fetch manifest.js with cache-bust and re-eval to update window.AIDLC_MANIFEST
    try {
      const res  = await fetch("/manifest.js?t=" + Date.now());
      const text = await res.text();
      // eslint-disable-next-line no-eval
      (0, eval)(text);
    } catch (_) { return; }

    const M = window.AIDLC_MANIFEST;
    if (!M || !M.files) return;

    renderAidlcStatus(parseAidlcStatus(M.files));

    // Re-render nav keeping current doc open
    renderNav(M.files);

    // Re-highlight current active item
    const hash = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (hash) {
      document.querySelectorAll(".nav-item").forEach(el => {
        el.classList.toggle("active", el.dataset.path === hash);
      });
    }

    const label = info.files ? info.files + " docs" : "docs atualizados";
    showToast("🟢 " + label);
  });

  es.onerror = () => {
    // Server not running in watch mode — disconnect quietly
    es.close();
  };
}

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("live-toast");
  if (!el) return;
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

// ─── MOBILE SIDEBAR TOGGLE ───────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
